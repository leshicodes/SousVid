services:
  sousvid:
    build: .
    container_name: sousvid
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./cookies:/app/cookies
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build: .
    container_name: sousvid-worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - whisper-cache:/root/.cache/huggingface
      - ./cookies:/app/cookies
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: sousvid-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  whisper-cache:
    driver: local
  redis-data:
    driver: local
